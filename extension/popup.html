<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 320px;
        margin: 0;
        padding: 16px;
        font-family: -apple-system, "SF Pro Text", Inter, system-ui, sans-serif;
        color: #1d1d1f;
        background: #fafafa;
      }
      h1 {
        font-size: 14px;
        font-weight: 600;
        margin: 0 0 4px;
      }
      p.hint {
        font-size: 11.5px;
        color: #6e6e73;
        margin: 0 0 12px;
        line-height: 1.4;
      }
      button {
        width: 100%;
        border: none;
        border-radius: 12px;
        padding: 10px 14px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        margin-bottom: 8px;
      }
      .primary {
        background: #007aff;
        color: white;
      }
      .secondary {
        background: rgba(0, 0, 0, 0.06);
        color: #1d1d1f;
      }
      .status {
        font-size: 11.5px;
        color: #6e6e73;
        margin: 4px 0 12px;
        min-height: 14px;
      }
      ul {
        list-style: none;
        margin: 0;
        padding: 0;
        max-height: 220px;
        overflow-y: auto;
      }
      li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        padding: 8px 0;
        border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        font-size: 12px;
      }
      li .meta {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      li button.delete {
        width: auto;
        margin: 0;
        padding: 4px 8px;
        background: transparent;
        color: #ff3b30;
        font-size: 11px;
      }
      .empty {
        font-size: 12px;
        color: #6e6e73;
        text-align: center;
        padding: 16px 0;
      }
      .progress-track {
        height: 6px;
        border-radius: 3px;
        background: rgba(0, 0, 0, 0.08);
        overflow: hidden;
        margin: 6px 0 10px;
        display: none;
      }
      .progress-fill {
        height: 100%;
        background: #007aff;
        width: 0%;
        transition: width 0.2s ease;
      }
      .settings {
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: 10px;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.04);
        margin-bottom: 12px;
      }
      .settings label {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
      }
      .settings input[type="text"] {
        width: 100%;
        box-sizing: border-box;
        padding: 6px 8px;
        border-radius: 8px;
        border: 1px solid rgba(0, 0, 0, 0.12);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h1>Noetis Capture</h1>
    <p class="hint">
      Open a ChatGPT or Claude conversation, then capture it here. With
      auto-push on, each capture is sent straight to your local Noetis app
      — no file needed.
    </p>

    <div class="settings">
      <label>
        <input type="checkbox" id="autoPush" />
        Auto-push to Noetis dev server
      </label>
      <input type="text" id="baseUrl" placeholder="http://localhost:3000" />
      <input type="text" id="accessKey" placeholder="Access key (matches NEXT_PUBLIC_APP_ACCESS_KEY)" />
    </div>

    <button id="capture" class="primary">Capture this tab</button>
    <button id="captureAll" class="secondary">Capture all recent (this tab's sidebar)</button>
    <div id="progressTrack" class="progress-track"><div id="progressFill" class="progress-fill"></div></div>
    <div id="status" class="status"></div>
    <ul id="list"></ul>
    <button id="download" class="secondary">Download Capsule (JSON)</button>
    <button id="clear" class="secondary">Clear all</button>
    <script src="popup.js"></script>
  </body>
</html>
